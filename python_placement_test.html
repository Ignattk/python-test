<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python — Тест на определение уровня</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0f1117;--card:#1a1d27;--card-hover:#222633;
--accent:#22c55e;--accent-dim:#16a34a;--accent-glow:rgba(34,197,94,.15);
--text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b;
--danger:#ef4444;--warning:#f59e0b;--info:#3b82f6;
--border:#2a2e3d;--code-bg:#141620;
--correct:#166534;--wrong:#7f1d1d;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.grain{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.container{max-width:720px;margin:0 auto;padding:24px 16px 80px}

/* Header */
.header{text-align:center;padding:48px 0 32px;position:relative}
.header::before{content:'>';font-family:'JetBrains Mono',monospace;font-size:64px;color:var(--accent);opacity:.15;position:absolute;top:12px;left:50%;transform:translateX(-120px)}
.header h1{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;letter-spacing:-1px;margin-bottom:8px}
.header h1 span{color:var(--accent)}
.header p{color:var(--text-dim);font-size:15px;max-width:420px;margin:0 auto}

/* Progress */
.progress-wrap{margin:24px 0 32px;display:flex;align-items:center;gap:12px}
.progress-bar{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#4ade80);border-radius:99px;transition:width .4s ease;width:0%}
.progress-text{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted);min-width:48px;text-align:right}

/* Question card */
.question-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 28px;margin-bottom:16px;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.q-badge{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);background:var(--accent-glow);padding:4px 10px;border-radius:6px;margin-bottom:16px}
.q-level{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-left:6px}
.q-level.easy{background:#166534;color:#4ade80}
.q-level.medium{background:#713f12;color:#fbbf24}
.q-level.hard{background:#7f1d1d;color:#fca5a5}
.q-text{font-size:17px;font-weight:600;line-height:1.55;margin-bottom:20px}
.q-code{font-family:'JetBrains Mono',monospace;font-size:13.5px;background:var(--code-bg);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:20px;line-height:1.7;white-space:pre-wrap;overflow-x:auto}
.q-code .kw{color:#c084fc}.q-code .fn{color:#60a5fa}.q-code .str{color:#4ade80}.q-code .num{color:#f59e0b}.q-code .cm{color:#64748b;font-style:italic}.q-code .op{color:#f472b6}

/* Options */
.options{display:flex;flex-direction:column;gap:10px}
.option{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:14px 18px;cursor:pointer;font-size:15px;font-weight:600;transition:all .15s ease;display:flex;align-items:center;gap:12px;position:relative}
.option:hover{border-color:var(--accent);background:var(--accent-glow)}
.option .marker{width:28px;height:28px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--text-muted);flex-shrink:0;transition:all .15s}
.option:hover .marker{border-color:var(--accent);color:var(--accent)}
.option.selected{border-color:var(--accent);background:var(--accent-glow)}
.option.selected .marker{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.option.correct{border-color:#22c55e;background:rgba(34,197,94,.1)}
.option.correct .marker{background:#22c55e;border-color:#22c55e;color:#fff}
.option.wrong{border-color:#ef4444;background:rgba(239,68,68,.08)}
.option.wrong .marker{background:#ef4444;border-color:#ef4444;color:#fff}
.option.disabled{pointer-events:none;opacity:.6}
.option.disabled.correct{opacity:1}
.option code{font-family:'JetBrains Mono',monospace;font-size:13.5px;background:var(--code-bg);padding:2px 6px;border-radius:4px}

/* Buttons */
.btn{font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;padding:14px 28px;border:none;border-radius:10px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{background:#4ade80;transform:translateY(-1px)}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent)}
.btn:disabled{opacity:.4;pointer-events:none}
.actions{display:flex;justify-content:flex-end;margin-top:20px;gap:12px}

/* Results */
.results{animation:fadeUp .4s ease}
.results-header{text-align:center;padding:40px 0 32px}
.results-header .score-ring{width:140px;height:140px;margin:0 auto 20px;position:relative}
.results-header .score-ring svg{transform:rotate(-90deg)}
.results-header .score-ring .score-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700}
.results-header h2{font-size:24px;font-weight:800;margin-bottom:6px}
.results-header .level-tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:14px;padding:6px 16px;border-radius:8px;background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent);margin-bottom:12px}
.results-header p{color:var(--text-dim);font-size:15px;max-width:440px;margin:0 auto}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:24px 0}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.stat .val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700}
.stat .label{font-size:12px;color:var(--text-muted);margin-top:4px}
.stat.green .val{color:#4ade80}.stat.red .val{color:#f87171}.stat.yellow .val{color:#fbbf24}

.breakdown{margin:24px 0}
.breakdown h3{font-size:14px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
.breakdown-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.breakdown-row:last-child{border:none}
.breakdown-row .num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted);width:24px}
.breakdown-row .icon{font-size:16px;width:24px;text-align:center}
.breakdown-row .bq{flex:1;font-size:14px;color:var(--text-dim)}

.copy-section{text-align:center;margin:32px 0}
.copy-box{background:var(--code-bg);border:1px solid var(--border);border-radius:12px;padding:20px;margin:12px 0;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;color:var(--text-dim);text-align:left;white-space:pre-wrap}

/* Start screen */
.start-screen{text-align:center;padding:60px 20px}
.start-screen .icon-big{font-size:56px;margin-bottom:20px}
.start-screen h2{font-size:22px;font-weight:800;margin-bottom:8px}
.start-screen p{color:var(--text-dim);font-size:15px;margin-bottom:32px;max-width:400px;margin-left:auto;margin-right:auto}
.start-screen .meta{display:flex;justify-content:center;gap:24px;margin-bottom:32px}
.start-screen .meta span{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:6px}

@media(max-width:520px){
.container{padding:16px 12px 60px}
.question-card{padding:24px 18px}
.header h1{font-size:22px}
.stat-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="grain"></div>
<div class="container" id="app"></div>

<script>
const questions = [
  // === EASY x10 ===
  {
    level:"easy",levelText:"Базовый",
    text:"Что выведет этот код?",
    code:`<span class="kw">print</span>(<span class="fn">type</span>(<span class="num">3.14</span>))`,
    options:[
      {text:`<code>&lt;class 'float'&gt;</code>`,correct:true},
      {text:`<code>&lt;class 'int'&gt;</code>`},
      {text:`<code>&lt;class 'double'&gt;</code>`},
      {text:`<code>&lt;class 'number'&gt;</code>`}
    ]
  },
  {
    level:"easy",levelText:"Базовый",
    text:"Как правильно создать список из трёх элементов?",
    code:null,
    options:[
      {text:`<code>lst = [1, 2, 3]</code>`,correct:true},
      {text:`<code>lst = (1, 2, 3)</code>`},
      {text:`<code>lst = {1, 2, 3}</code>`},
      {text:`<code>lst = &lt;1, 2, 3&gt;</code>`}
    ]
  },
  {
    level:"easy",levelText:"Базовый",
    text:"Что выведет этот код?",
    code:`x = <span class="str">"hello"</span>\n<span class="kw">print</span>(x[<span class="num">1</span>])`,
    options:[
      {text:`<code>e</code>`,correct:true},
      {text:`<code>h</code>`},
      {text:`<code>l</code>`},
      {text:`Ошибку`}
    ]
  },
  {
    level:"easy",levelText:"Базовый",
    text:"Какой оператор используется для проверки принадлежности элемента к коллекции?",
    code:null,
    options:[
      {text:`<code>in</code>`,correct:true},
      {text:`<code>has</code>`},
      {text:`<code>contains</code>`},
      {text:`<code>exists</code>`}
    ]
  },
  {
    level:"easy",levelText:"Базовый",
    text:"Что выведет этот код?",
    code:`<span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="num">3</span>):\n    <span class="kw">print</span>(i, end=<span class="str">" "</span>)`,
    options:[
      {text:`<code>0 1 2</code>`,correct:true},
      {text:`<code>1 2 3</code>`},
      {text:`<code>0 1 2 3</code>`},
      {text:`<code>1 2</code>`}
    ]
  },
  {
    level:"easy",levelText:"Базовый",
    text:"Как правильно написать условие «если x больше 5»?",
    code:null,
    options:[
      {text:`<code>if x > 5:</code>`,correct:true},
      {text:`<code>if x > 5 then</code>`},
      {text:`<code>if (x > 5) {</code>`},
      {text:`<code>when x > 5:</code>`}
    ]
  },
  {
    level:"easy",levelText:"Базовый",
    text:"Что вернёт этот код?",
    code:`<span class="kw">print</span>(<span class="fn">len</span>(<span class="str">"Python"</span>))`,
    options:[
      {text:`<code>6</code>`,correct:true},
      {text:`<code>5</code>`},
      {text:`<code>7</code>`},
      {text:`Ошибку`}
    ]
  },
  {
    level:"easy",levelText:"Базовый",
    text:"Какой результат выражения?",
    code:`<span class="kw">print</span>(<span class="num">10</span> <span class="op">//</span> <span class="num">3</span>)`,
    options:[
      {text:`<code>3</code>`,correct:true},
      {text:`<code>3.33</code>`},
      {text:`<code>4</code>`},
      {text:`<code>1</code>`}
    ]
  },
  {
    level:"easy",levelText:"Базовый",
    text:"Как добавить элемент в конец списка?",
    code:null,
    options:[
      {text:`<code>lst.append(x)</code>`,correct:true},
      {text:`<code>lst.add(x)</code>`},
      {text:`<code>lst.push(x)</code>`},
      {text:`<code>lst.insert(x)</code>`}
    ]
  },
  {
    level:"easy",levelText:"Базовый",
    text:"Что выведет этот код?",
    code:`x = <span class="num">5</span>\n<span class="kw">print</span>(x <span class="op">==</span> <span class="num">5</span>, x <span class="op">is</span> <span class="num">5</span>)`,
    options:[
      {text:`<code>True True</code>`,correct:true},
      {text:`<code>True False</code>`},
      {text:`<code>False True</code>`},
      {text:`Ошибку`}
    ]
  },
  // === MEDIUM x5 ===
  {
    level:"medium",levelText:"Средний",
    text:"Что выведет этот код?",
    code:`a = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>]\nb = a\nb.append(<span class="num">4</span>)\n<span class="kw">print</span>(<span class="fn">len</span>(a))`,
    options:[
      {text:`<code>4</code>`,correct:true},
      {text:`<code>3</code>`},
      {text:`<code>Ошибку</code>`},
      {text:`<code>None</code>`}
    ]
  },
  {
    level:"medium",levelText:"Средний",
    text:"Чему будет равно значение result?",
    code:`result = [x<span class="op">**</span><span class="num">2</span> <span class="kw">for</span> x <span class="kw">in</span> <span class="fn">range</span>(<span class="num">5</span>) <span class="kw">if</span> x <span class="op">%</span> <span class="num">2</span> <span class="op">==</span> <span class="num">0</span>]`,
    options:[
      {text:`<code>[0, 4, 16]</code>`,correct:true},
      {text:`<code>[1, 9, 25]</code>`},
      {text:`<code>[0, 1, 4, 9, 16]</code>`},
      {text:`<code>[4, 16]</code>`}
    ]
  },
  {
    level:"medium",levelText:"Средний",
    text:"Что выведет этот код?",
    code:`<span class="kw">def</span> <span class="fn">foo</span>(a, b=[]):\n    b.append(a)\n    <span class="kw">return</span> b\n\n<span class="kw">print</span>(<span class="fn">foo</span>(<span class="num">1</span>))\n<span class="kw">print</span>(<span class="fn">foo</span>(<span class="num">2</span>))`,
    options:[
      {text:`<code>[1]</code> затем <code>[1, 2]</code>`,correct:true},
      {text:`<code>[1]</code> затем <code>[2]</code>`},
      {text:`<code>[1]</code> затем ошибку`},
      {text:`<code>1</code> затем <code>2</code>`}
    ]
  },
  {
    level:"medium",levelText:"Средний",
    text:"Какой метод словаря вернёт значение по ключу, не вызывая ошибку, если ключа нет?",
    code:null,
    options:[
      {text:`<code>.get()</code>`,correct:true},
      {text:`<code>.find()</code>`},
      {text:`<code>.fetch()</code>`},
      {text:`<code>.search()</code>`}
    ]
  },
  {
    level:"medium",levelText:"Средний",
    text:"Что делает эта конструкция?",
    code:`<span class="kw">with</span> <span class="fn">open</span>(<span class="str">"file.txt"</span>) <span class="kw">as</span> f:\n    data = f.read()`,
    options:[
      {text:`Читает файл и автоматически закрывает его`,correct:true},
      {text:`Создаёт новый файл`},
      {text:`Читает файл, но не закрывает`},
      {text:`Записывает данные в файл`}
    ]
  },
  // === HARD x5 ===
  {
    level:"hard",levelText:"Продвинутый",
    text:"Что выведет этот код?",
    code:`<span class="kw">def</span> <span class="fn">make_counter</span>():\n    count = <span class="num">0</span>\n    <span class="kw">def</span> <span class="fn">counter</span>():\n        <span class="kw">nonlocal</span> count\n        count <span class="op">+=</span> <span class="num">1</span>\n        <span class="kw">return</span> count\n    <span class="kw">return</span> counter\n\nc = <span class="fn">make_counter</span>()\n<span class="kw">print</span>(<span class="fn">c</span>(), <span class="fn">c</span>(), <span class="fn">c</span>())`,
    options:[
      {text:`<code>1 2 3</code>`,correct:true},
      {text:`<code>1 1 1</code>`},
      {text:`<code>0 1 2</code>`},
      {text:`Ошибку — нельзя менять переменную из замыкания`}
    ]
  },
  {
    level:"hard",levelText:"Продвинутый",
    text:"Что вернёт выражение?",
    code:`<span class="fn">list</span>(<span class="fn">zip</span>([<span class="num">1</span>,<span class="num">2</span>,<span class="num">3</span>], <span class="str">"ab"</span>))`,
    options:[
      {text:`<code>[(1,'a'), (2,'b')]</code>`,correct:true},
      {text:`<code>[(1,'a'), (2,'b'), (3,None)]</code>`},
      {text:`Ошибку — разная длина`},
      {text:`<code>[(1,'a'), (2,'b'), (3,'')]</code>`}
    ]
  },
  {
    level:"hard",levelText:"Продвинутый",
    text:"Какой декоратор делает метод доступным без создания экземпляра класса?",
    code:null,
    options:[
      {text:`<code>@staticmethod</code>`,correct:true},
      {text:`<code>@classmethod</code>`},
      {text:`<code>@property</code>`},
      {text:`<code>@abstractmethod</code>`}
    ]
  },
  {
    level:"hard",levelText:"Продвинутый",
    text:"Что выведет этот код?",
    code:`a = {<span class="str">'x'</span>: <span class="num">1</span>}\nb = {<span class="str">'y'</span>: <span class="num">2</span>}\nc = a <span class="op">|</span> b\n<span class="kw">print</span>(c)`,
    options:[
      {text:`<code>{'x': 1, 'y': 2}</code>`,correct:true},
      {text:`Ошибку`},
      {text:`<code>{'x': 1}</code>`},
      {text:`<code>True</code>`}
    ]
  },
  {
    level:"hard",levelText:"Продвинутый",
    text:"Что выведет этот код?",
    code:`<span class="kw">print</span>([i <span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="num">10</span>) <span class="kw">if</span> i <span class="op">%</span> <span class="num">3</span> <span class="op">==</span> <span class="num">0</span> <span class="kw">and</span> i <span class="op">%</span> <span class="num">2</span> <span class="op">==</span> <span class="num">0</span>])`,
    options:[
      {text:`<code>[0, 6]</code>`,correct:true},
      {text:`<code>[0, 3, 6, 9]</code>`},
      {text:`<code>[0, 2, 4, 6, 8]</code>`},
      {text:`<code>[6]</code>`}
    ]
  }
];

const app = document.getElementById('app');
let current = 0;
let answers = [];
let answered = false;

function renderStart(){
  app.innerHTML = `
    <div class="header">
      <h1><span>Python</span> Placement Test</h1>
    </div>
    <div class="start-screen">
      <div class="icon-big">🐍</div>
      <h2>Определим твой уровень</h2>
      <button class="btn btn-primary" onclick="startQuiz()" style="font-size:17px;padding:16px 40px">Начать тест →</button>
    </div>`;
}

function startQuiz(){ current=0; answers=[]; renderQuestion(); }

function renderQuestion(){
  answered=false;
  const q = questions[current];
  const pct = Math.round((current/questions.length)*100);
  const lvlClass = q.level;
  const codeBlock = q.code ? `<div class="q-code">${q.code}</div>` : '';
  const opts = q.options.map((o,i)=>{
    const letter = String.fromCharCode(65+i);
    return `<div class="option" onclick="selectOption(${i})" id="opt-${i}">
      <div class="marker">${letter}</div>
      <div>${o.text}</div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="header">
      <h1><span>Python</span> Placement Test</h1>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">${current+1}/${questions.length}</div>
    </div>
    <div class="question-card">
      <div class="q-badge">Вопрос ${current+1} <span class="q-level ${lvlClass}">${q.levelText}</span></div>
      <div class="q-text">${q.text}</div>
      ${codeBlock}
      <div class="options">${opts}</div>
      <div class="actions">
        <button class="btn btn-primary" id="nextBtn" disabled onclick="nextQuestion()">
          ${current < questions.length-1 ? 'Далее →' : 'Результаты →'}
        </button>
      </div>
    </div>`;
}

function selectOption(idx){
  if(answered) return;
  answered = true;
  const q = questions[current];
  const correctIdx = q.options.findIndex(o=>o.correct);
  answers.push({qIdx:current, selected:idx, correct:correctIdx===idx, level:q.level});

  document.querySelectorAll('.option').forEach((el,i)=>{
    el.classList.add('disabled');
    if(i===correctIdx) el.classList.add('correct');
    if(i===idx && idx!==correctIdx) el.classList.add('wrong');
  });
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion(){
  current++;
  if(current >= questions.length) renderResults();
  else renderQuestion();
}

function renderResults(){
  const total = answers.length;
  const correctCount = answers.filter(a=>a.correct).length;
  const pct = Math.round((correctCount/total)*100);

  const easy = answers.filter(a=>a.level==='easy');
  const med = answers.filter(a=>a.level==='medium');
  const hard = answers.filter(a=>a.level==='hard');
  const easyOk = easy.filter(a=>a.correct).length;
  const medOk = med.filter(a=>a.correct).length;
  const hardOk = hard.filter(a=>a.correct).length;

  let level, levelDesc;
  if(easyOk < 6){
    level = "Новичок";
    levelDesc = "Нужно начать с основ: переменные, типы данных, условия, циклы, базовые структуры данных.";
  } else if(medOk < 3){
    level = "Базовый";
    levelDesc = "Основы есть, но нужно углубиться в: списковые включения, работу с файлами, мутабельность, словари.";
  } else if(hardOk < 3){
    level = "Средний";
    levelDesc = "Хорошая база! Пора переходить к: замыканиям, декораторам, ООП, генераторам, работе с модулями.";
  } else {
    level = "Продвинутый";
    levelDesc = "Отличный уровень. Можно углубляться в: async/await, метаклассы, паттерны проектирования, алгоритмы.";
  }

  const circumference = 2 * Math.PI * 56;
  const offset = circumference - (pct/100)*circumference;

  const breakdownHtml = answers.map((a,i)=>{
    const icon = a.correct ? '✅' : '❌';
    const q = questions[a.qIdx];
    return `<div class="breakdown-row">
      <div class="num">${i+1}</div>
      <div class="icon">${icon}</div>
      <div class="bq">${q.text.substring(0,60)}${q.text.length>60?'...':''}</div>
    </div>`;
  }).join('');

  const summaryText = `📊 Python Placement Test\n\nУровень: ${level}\nРезультат: ${correctCount}/${total} (${pct}%)\n\nБазовый: ${easyOk}/${easy.length}\nСредний: ${medOk}/${med.length}\nПродвинутый: ${hardOk}/${hard.length}\n\n${levelDesc}`;

  app.innerHTML = `
    <div class="header">
      <h1><span>Python</span> Placement Test</h1>
    </div>
    <div class="results">
      <div class="results-header">
        <div class="score-ring">
          <svg width="140" height="140">
            <circle cx="70" cy="70" r="56" fill="none" stroke="var(--border)" stroke-width="8"/>
            <circle cx="70" cy="70" r="56" fill="none" stroke="var(--accent)" stroke-width="8"
              stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
              stroke-linecap="round" style="transition:stroke-dashoffset 1s ease"/>
          </svg>
          <div class="score-text">${pct}%</div>
        </div>
        <div class="level-tag">${level}</div>
        <h2>${correctCount} из ${total}</h2>
        <p>${levelDesc}</p>
      </div>

      <div class="stat-grid">
        <div class="stat green"><div class="val">${easyOk}/${easy.length}</div><div class="label">Базовый</div></div>
        <div class="stat yellow"><div class="val">${medOk}/${med.length}</div><div class="label">Средний</div></div>
        <div class="stat red"><div class="val">${hardOk}/${hard.length}</div><div class="label">Продвинутый</div></div>
      </div>

      <div class="breakdown">
        <h3>Разбор ответов</h3>
        ${breakdownHtml}
      </div>

      <div class="copy-section">
        <button class="btn btn-secondary" onclick="copyResult()">📋 Скопировать результат</button>
        <div class="copy-box" id="copyBox">${summaryText}</div>
        <div style="margin-top:16px">
          <button class="btn btn-primary" onclick="renderStart()">↻ Пройти заново</button>
        </div>
      </div>
    </div>`;
}

function copyResult(){
  const text = document.getElementById('copyBox').innerText;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.querySelector('.copy-section .btn-secondary');
    btn.textContent = '✅ Скопировано!';
    setTimeout(()=>btn.textContent='📋 Скопировать результат', 2000);
  });
}

renderStart();
</script>
</body>
</html>
