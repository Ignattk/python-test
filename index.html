<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Python — Тест на определение уровня</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0f1117;--card:#1a1d27;
--accent:#22c55e;--accent-glow:rgba(34,197,94,.15);
--text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b;
--border:#2a2e3d;--code-bg:#141620;
}
html{-webkit-text-size-adjust:100%}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

.container{max-width:680px;margin:0 auto;padding:20px 16px 100px}

.header{text-align:center;padding:36px 0 24px;position:relative}
.header::before{content:'>';font-family:'JetBrains Mono',monospace;font-size:56px;color:var(--accent);opacity:.12;position:absolute;top:8px;left:50%;transform:translateX(-100px)}
.header h1{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;letter-spacing:-1px}
.header h1 span{color:var(--accent)}

.progress-wrap{margin:16px 0 24px;display:flex;align-items:center;gap:12px}
.progress-bar{flex:1;height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#4ade80);border-radius:99px;transition:width .4s ease;width:0%}
.progress-text{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted);min-width:48px;text-align:right}

.question-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px 20px;margin-bottom:16px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.q-badge{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);background:var(--accent-glow);padding:4px 10px;border-radius:6px;margin-bottom:14px}
.q-level{font-size:10px;padding:3px 7px;border-radius:4px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-left:4px}
.q-level.easy{background:#166534;color:#4ade80}
.q-level.medium{background:#713f12;color:#fbbf24}
.q-level.hard{background:#7f1d1d;color:#fca5a5}
.q-text{font-size:16px;font-weight:600;line-height:1.5;margin-bottom:16px}
.q-code{font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--code-bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:18px;line-height:1.65;white-space:pre-wrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.q-code .kw{color:#c084fc}.q-code .fn{color:#60a5fa}.q-code .str{color:#4ade80}.q-code .num{color:#f59e0b}.q-code .cm{color:#64748b;font-style:italic}.q-code .op{color:#f472b6}

.options{display:flex;flex-direction:column;gap:8px}
.option{
  background:var(--bg);border:1.5px solid var(--border);border-radius:10px;
  padding:15px 16px;cursor:pointer;font-size:14px;font-weight:600;
  display:flex;align-items:center;gap:12px;position:relative;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;
  min-height:50px;transition:border-color .15s,background .15s,transform .1s;
}
.option:active{transform:scale(0.98)}
.option.selected{border-color:var(--accent);background:var(--accent-glow)}
.option.selected .marker{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.option .marker{
  width:26px;height:26px;border-radius:6px;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  color:var(--text-muted);flex-shrink:0;transition:all .15s;
}
.option code{font-family:'JetBrains Mono',monospace;font-size:12.5px;background:var(--code-bg);padding:2px 6px;border-radius:4px}

.btn{
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;
  padding:14px 24px;border:none;border-radius:10px;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  transition:background .15s,transform .1s;
}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:#000}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn:disabled{opacity:.35;pointer-events:none}
.actions{display:flex;justify-content:flex-end;margin-top:18px}

.results{animation:fadeUp .4s ease}
.results-header{text-align:center;padding:32px 0 24px}
.score-ring{width:130px;height:130px;margin:0 auto 16px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700}
.results-header h2{font-size:22px;font-weight:800;margin-bottom:6px}
.level-tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:13px;padding:5px 14px;border-radius:7px;background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent);margin-bottom:10px}
.results-header p{color:var(--text-dim);font-size:14px;max-width:420px;margin:0 auto;line-height:1.5}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 8px;text-align:center}
.stat .val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700}
.stat .label{font-size:11px;color:var(--text-muted);margin-top:3px}
.stat.green .val{color:#4ade80}.stat.red .val{color:#f87171}.stat.yellow .val{color:#fbbf24}

.review{margin:24px 0}
.review h3{font-size:13px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.review-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 16px;margin-bottom:10px}
.review-card .rc-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px}
.review-card .rc-head .rc-num{font-family:'JetBrains Mono',monospace;color:var(--text-muted)}
.review-card .rc-head .rc-icon{font-size:15px}
.review-card .rc-q{font-size:14px;font-weight:600;margin-bottom:8px;line-height:1.4}
.review-card .rc-code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:10px;line-height:1.5;white-space:pre-wrap;overflow-x:auto}
.review-card .rc-answer{font-size:13px;padding:8px 12px;border-radius:6px;display:inline-block}
.review-card .rc-answer.right{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.review-card .rc-answer.wrong{background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.review-card .rc-correct{font-size:12px;color:var(--text-muted);margin-top:6px}
.review-card .rc-correct b{color:#4ade80}

.copy-section{text-align:center;margin:28px 0}
.copy-box{background:var(--code-bg);border:1px solid var(--border);border-radius:10px;padding:16px;margin:12px 0;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;color:var(--text-dim);text-align:left;white-space:pre-wrap}

.start-screen{text-align:center;padding:48px 16px}
.start-screen .icon-big{font-size:52px;margin-bottom:16px}
.start-screen h2{font-size:20px;font-weight:800;margin-bottom:24px}

@media(max-width:480px){
  .container{padding:12px 10px 80px}
  .header{padding:24px 0 16px}
  .header h1{font-size:19px}
  .header::before{font-size:40px;top:0}
  .question-card{padding:18px 14px}
  .q-text{font-size:15px}
  .q-code{font-size:11.5px;padding:10px 12px}
  .option{padding:13px 12px;font-size:13px;min-height:46px;gap:10px}
  .option .marker{width:24px;height:24px;font-size:10px}
  .option code{font-size:11.5px}
  .btn{width:100%;padding:14px;font-size:14px}
  .stat .val{font-size:18px}
  .stat{padding:12px 6px}
  .review-card{padding:14px 12px}
  .copy-box{font-size:10.5px;padding:12px}
}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const questions = [
  {level:"easy",levelText:"Базовый",text:"Что выведет этот код?",
    code:`<span class="kw">print</span>(<span class="fn">type</span>(<span class="num">3.14</span>))`,
    options:[{text:`<code>&lt;class 'float'&gt;</code>`,correct:true},{text:`<code>&lt;class 'int'&gt;</code>`},{text:`<code>&lt;class 'double'&gt;</code>`},{text:`<code>&lt;class 'number'&gt;</code>`}]},
  {level:"easy",levelText:"Базовый",text:"Как правильно создать список из трёх элементов?",code:null,
    options:[{text:`<code>lst = [1, 2, 3]</code>`,correct:true},{text:`<code>lst = (1, 2, 3)</code>`},{text:`<code>lst = {1, 2, 3}</code>`},{text:`<code>lst = &lt;1, 2, 3&gt;</code>`}]},
  {level:"easy",levelText:"Базовый",text:"Что выведет этот код?",
    code:`x = <span class="str">"hello"</span>\n<span class="kw">print</span>(x[<span class="num">1</span>])`,
    options:[{text:`<code>e</code>`,correct:true},{text:`<code>h</code>`},{text:`<code>l</code>`},{text:`Ошибку`}]},
  {level:"easy",levelText:"Базовый",text:"Какой оператор проверяет принадлежность элемента к коллекции?",code:null,
    options:[{text:`<code>in</code>`,correct:true},{text:`<code>has</code>`},{text:`<code>contains</code>`},{text:`<code>exists</code>`}]},
  {level:"easy",levelText:"Базовый",text:"Что выведет этот код?",
    code:`<span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="num">3</span>):\n    <span class="kw">print</span>(i, end=<span class="str">" "</span>)`,
    options:[{text:`<code>0 1 2</code>`,correct:true},{text:`<code>1 2 3</code>`},{text:`<code>0 1 2 3</code>`},{text:`<code>1 2</code>`}]},
  {level:"easy",levelText:"Базовый",text:"Как правильно написать условие «если x больше 5»?",code:null,
    options:[{text:`<code>if x > 5:</code>`,correct:true},{text:`<code>if x > 5 then</code>`},{text:`<code>if (x > 5) {</code>`},{text:`<code>when x > 5:</code>`}]},
  {level:"easy",levelText:"Базовый",text:"Что вернёт этот код?",
    code:`<span class="kw">print</span>(<span class="fn">len</span>(<span class="str">"Python"</span>))`,
    options:[{text:`<code>6</code>`,correct:true},{text:`<code>5</code>`},{text:`<code>7</code>`},{text:`Ошибку`}]},
  {level:"easy",levelText:"Базовый",text:"Какой результат выражения?",
    code:`<span class="kw">print</span>(<span class="num">10</span> <span class="op">//</span> <span class="num">3</span>)`,
    options:[{text:`<code>3</code>`,correct:true},{text:`<code>3.33</code>`},{text:`<code>4</code>`},{text:`<code>1</code>`}]},
  {level:"easy",levelText:"Базовый",text:"Как добавить элемент в конец списка?",code:null,
    options:[{text:`<code>lst.append(x)</code>`,correct:true},{text:`<code>lst.add(x)</code>`},{text:`<code>lst.push(x)</code>`},{text:`<code>lst.insert(x)</code>`}]},
  {level:"easy",levelText:"Базовый",text:"Какое ключевое слово используется для определения функции?",code:null,
    options:[{text:`<code>def</code>`,correct:true},{text:`<code>func</code>`},{text:`<code>function</code>`},{text:`<code>define</code>`}]},
  {level:"medium",levelText:"Средний",text:"Что выведет этот код?",
    code:`a = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>]\nb = a\nb.append(<span class="num">4</span>)\n<span class="kw">print</span>(<span class="fn">len</span>(a))`,
    options:[{text:`<code>4</code>`,correct:true},{text:`<code>3</code>`},{text:`Ошибку`},{text:`<code>None</code>`}]},
  {level:"medium",levelText:"Средний",text:"Чему равно значение result?",
    code:`result = [x<span class="op">**</span><span class="num">2</span> <span class="kw">for</span> x <span class="kw">in</span> <span class="fn">range</span>(<span class="num">5</span>) <span class="kw">if</span> x <span class="op">%</span> <span class="num">2</span> <span class="op">==</span> <span class="num">0</span>]`,
    options:[{text:`<code>[0, 4, 16]</code>`,correct:true},{text:`<code>[1, 9, 25]</code>`},{text:`<code>[0, 1, 4, 9, 16]</code>`},{text:`<code>[4, 16]</code>`}]},
  {level:"medium",levelText:"Средний",text:"Что выведет этот код?",
    code:`<span class="kw">def</span> <span class="fn">foo</span>(a, b=[]):\n    b.append(a)\n    <span class="kw">return</span> b\n\n<span class="kw">print</span>(<span class="fn">foo</span>(<span class="num">1</span>))\n<span class="kw">print</span>(<span class="fn">foo</span>(<span class="num">2</span>))`,
    options:[{text:`<code>[1]</code> затем <code>[1, 2]</code>`,correct:true},{text:`<code>[1]</code> затем <code>[2]</code>`},{text:`<code>[1]</code> затем ошибку`},{text:`<code>1</code> затем <code>2</code>`}]},
  {level:"medium",levelText:"Средний",text:"Какой метод словаря вернёт значение по ключу без ошибки, если ключа нет?",code:null,
    options:[{text:`<code>.get()</code>`,correct:true},{text:`<code>.find()</code>`},{text:`<code>.fetch()</code>`},{text:`<code>.search()</code>`}]},
  {level:"medium",levelText:"Средний",text:"Что делает эта конструкция?",
    code:`<span class="kw">with</span> <span class="fn">open</span>(<span class="str">"file.txt"</span>) <span class="kw">as</span> f:\n    data = f.read()`,
    options:[{text:`Читает файл и автоматически закрывает его`,correct:true},{text:`Создаёт новый файл`},{text:`Читает файл, но не закрывает`},{text:`Записывает данные в файл`}]},
  {level:"hard",levelText:"Продвинутый",text:"Что выведет этот код?",
    code:`<span class="kw">def</span> <span class="fn">make_counter</span>():\n    count = <span class="num">0</span>\n    <span class="kw">def</span> <span class="fn">counter</span>():\n        <span class="kw">nonlocal</span> count\n        count <span class="op">+=</span> <span class="num">1</span>\n        <span class="kw">return</span> count\n    <span class="kw">return</span> counter\n\nc = <span class="fn">make_counter</span>()\n<span class="kw">print</span>(<span class="fn">c</span>(), <span class="fn">c</span>(), <span class="fn">c</span>())`,
    options:[{text:`<code>1 2 3</code>`,correct:true},{text:`<code>1 1 1</code>`},{text:`<code>0 1 2</code>`},{text:`Ошибку`}]},
  {level:"hard",levelText:"Продвинутый",text:"Что вернёт выражение?",
    code:`<span class="fn">list</span>(<span class="fn">zip</span>([<span class="num">1</span>,<span class="num">2</span>,<span class="num">3</span>], <span class="str">"ab"</span>))`,
    options:[{text:`<code>[(1,'a'), (2,'b')]</code>`,correct:true},{text:`<code>[(1,'a'), (2,'b'), (3,None)]</code>`},{text:`Ошибку — разная длина`},{text:`<code>[(1,'a'), (2,'b'), (3,'')]</code>`}]},
  {level:"hard",levelText:"Продвинутый",text:"Какой декоратор делает метод доступным без создания экземпляра класса?",code:null,
    options:[{text:`<code>@staticmethod</code>`,correct:true},{text:`<code>@classmethod</code>`},{text:`<code>@property</code>`},{text:`<code>@abstractmethod</code>`}]},
  {level:"hard",levelText:"Продвинутый",text:"Что выведет этот код?",
    code:`a = {<span class="str">'x'</span>: <span class="num">1</span>}\nb = {<span class="str">'y'</span>: <span class="num">2</span>}\nc = a <span class="op">|</span> b\n<span class="kw">print</span>(c)`,
    options:[{text:`<code>{'x': 1, 'y': 2}</code>`,correct:true},{text:`Ошибку`},{text:`<code>{'x': 1}</code>`},{text:`<code>True</code>`}]},
  {level:"hard",levelText:"Продвинутый",text:"Что выведет этот код?",
    code:`<span class="kw">print</span>([i <span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="num">10</span>) <span class="kw">if</span> i <span class="op">%</span> <span class="num">3</span> <span class="op">==</span> <span class="num">0</span> <span class="kw">and</span> i <span class="op">%</span> <span class="num">2</span> <span class="op">==</span> <span class="num">0</span>])`,
    options:[{text:`<code>[0, 6]</code>`,correct:true},{text:`<code>[0, 3, 6, 9]</code>`},{text:`<code>[0, 2, 4, 6, 8]</code>`},{text:`<code>[6]</code>`}]}
];

const app = document.getElementById('app');
let current = 0, answers = [], selectedIdx = -1, shuffledOpts = [];

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function renderStart(){
  app.innerHTML = `
    <div class="header"><h1><span>Python</span> Placement Test</h1></div>
    <div class="start-screen">
      <div class="icon-big">🐍</div>
      <h2>Определим твой уровень</h2>
      <button class="btn btn-primary" onclick="startQuiz()" style="font-size:16px;padding:16px 36px">Начать тест →</button>
    </div>`;
}

function startQuiz(){ current=0; answers=[]; renderQuestion(); }

function renderQuestion(){
  selectedIdx = -1;
  const q = questions[current];
  shuffledOpts = shuffle(q.options);
  const pct = Math.round((current/questions.length)*100);
  const codeBlock = q.code ? `<div class="q-code">${q.code}</div>` : '';
  const opts = shuffledOpts.map((o,i)=>{
    const letter = String.fromCharCode(65+i);
    return `<div class="option" onclick="pick(${i})" id="opt-${i}">
      <div class="marker">${letter}</div><div>${o.text}</div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="header"><h1><span>Python</span> Placement Test</h1></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">${current+1}/${questions.length}</div>
    </div>
    <div class="question-card">
      <div class="q-badge">Вопрос ${current+1} <span class="q-level ${q.level}">${q.levelText}</span></div>
      <div class="q-text">${q.text}</div>
      ${codeBlock}
      <div class="options">${opts}</div>
      <div class="actions">
        <button class="btn btn-primary" id="nextBtn" disabled onclick="next()">
          ${current < questions.length-1 ? 'Далее →' : 'Завершить →'}
        </button>
      </div>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function pick(idx){
  selectedIdx = idx;
  document.querySelectorAll('.option').forEach((el,i)=> el.classList.toggle('selected', i===idx));
  document.getElementById('nextBtn').disabled = false;
}

function next(){
  if(selectedIdx<0) return;
  const q = questions[current];
  const correctIdx = shuffledOpts.findIndex(o=>o.correct);
  answers.push({
    qIdx:current, correct:correctIdx===selectedIdx, level:q.level,
    selectedText:shuffledOpts[selectedIdx].text,
    correctText:shuffledOpts[correctIdx].text
  });
  current++;
  if(current>=questions.length) renderResults();
  else renderQuestion();
}

function renderResults(){
  const total=answers.length, ok=answers.filter(a=>a.correct).length, pct=Math.round((ok/total)*100);
  const easy=answers.filter(a=>a.level==='easy'), med=answers.filter(a=>a.level==='medium'), hard=answers.filter(a=>a.level==='hard');
  const eOk=easy.filter(a=>a.correct).length, mOk=med.filter(a=>a.correct).length, hOk=hard.filter(a=>a.correct).length;

  let level,desc;
  if(eOk<6){level="Новичок";desc="Нужно начать с основ: переменные, типы данных, условия, циклы, базовые структуры данных.";}
  else if(mOk<3){level="Базовый";desc="Основы есть, но нужно углубиться в: списковые включения, работу с файлами, мутабельность, словари.";}
  else if(hOk<3){level="Средний";desc="Хорошая база! Пора переходить к: замыканиям, декораторам, ООП, генераторам, работе с модулями.";}
  else{level="Продвинутый";desc="Отличный уровень. Можно углубляться в: async/await, метаклассы, паттерны проектирования, алгоритмы.";}

  const C=2*Math.PI*52, off=C-(pct/100)*C;

  const reviewHtml = answers.map((a,i)=>{
    const q=questions[a.qIdx], icon=a.correct?'✅':'❌';
    const code=q.code?`<div class="rc-code">${q.code}</div>`:'';
    const ans = a.correct
      ? `<div class="rc-answer right">✓ ${a.selectedText}</div>`
      : `<div class="rc-answer wrong">✗ ${a.selectedText}</div><div class="rc-correct">Правильно: <b>${a.correctText}</b></div>`;
    return `<div class="review-card">
      <div class="rc-head"><span class="rc-icon">${icon}</span><span class="rc-num">#${i+1}</span><span class="q-level ${q.level}" style="margin-left:auto">${q.levelText}</span></div>
      <div class="rc-q">${q.text}</div>${code}${ans}
    </div>`;
  }).join('');

  const summary=`📊 Python Placement Test\n\nУровень: ${level}\nРезультат: ${ok}/${total} (${pct}%)\n\nБазовый: ${eOk}/${easy.length}\nСредний: ${mOk}/${med.length}\nПродвинутый: ${hOk}/${hard.length}\n\n${desc}`;

  app.innerHTML = `
    <div class="header"><h1><span>Python</span> Placement Test</h1></div>
    <div class="results">
      <div class="results-header">
        <div class="score-ring">
          <svg width="130" height="130">
            <circle cx="65" cy="65" r="52" fill="none" stroke="var(--border)" stroke-width="7"/>
            <circle cx="65" cy="65" r="52" fill="none" stroke="var(--accent)" stroke-width="7"
              stroke-dasharray="${C}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset 1s ease"/>
          </svg>
          <div class="score-text">${pct}%</div>
        </div>
        <div class="level-tag">${level}</div>
        <h2>${ok} из ${total} правильно</h2>
        <p>${desc}</p>
      </div>
      <div class="stat-grid">
        <div class="stat green"><div class="val">${eOk}/${easy.length}</div><div class="label">Базовый</div></div>
        <div class="stat yellow"><div class="val">${mOk}/${med.length}</div><div class="label">Средний</div></div>
        <div class="stat red"><div class="val">${hOk}/${hard.length}</div><div class="label">Продвинутый</div></div>
      </div>
      <div class="review"><h3>Разбор ответов</h3>${reviewHtml}</div>
      <div class="copy-section">
        <button class="btn btn-secondary" onclick="copyR()" style="width:100%">📋 Скопировать результат</button>
        <div class="copy-box" id="copyBox">${summary}</div>
      </div>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function copyR(){
  const t=document.getElementById('copyBox').innerText;
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.querySelector('.copy-section .btn-secondary');
    b.textContent='✅ Скопировано!';setTimeout(()=>b.textContent='📋 Скопировать результат',2000);
  });
}

renderStart();
</script>
</body>
</html>
